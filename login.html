<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Connexion | UnivMarket</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        input { font-size: 16px !important; } /* Empêche le zoom auto sur iPhone */
        .auth-card { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 text-slate-900">

    <main class="auth-card w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl shadow-slate-200/50 p-6 sm:p-10 border border-slate-100 relative">
        
        <header class="text-center mb-8">
            <div class="inline-flex p-3.5 bg-indigo-600 rounded-2xl text-white mb-4 shadow-xl shadow-indigo-200">
                <i data-lucide="log-in" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Bon retour !</h1>
            <p class="text-slate-500 text-sm mt-2">Connecte-toi pour gérer tes annonces UnivMarket.</p>
        </header>

        <form id="login-form" class="space-y-5">
            <div class="space-y-1">
                <label class="block text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Email Étudiant</label>
                <div class="relative group">
                    <input type="email" id="login-email" placeholder="etudiant@uac.bj" required
                           class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all text-sm group-hover:bg-slate-100">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                </div>
            </div>

            <div class="space-y-1">
                <div class="flex justify-between items-center px-1">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase tracking-widest">Mot de passe</label>
                    <a href="forgot-password.html" class="text-[10px] font-bold text-indigo-600 hover:underline">Oublié ?</a>
                </div>
                <div class="relative group">
                    <input type="password" id="login-pass" placeholder="••••••••" required
                           class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 focus:bg-white outline-none transition-all text-sm group-hover:bg-slate-100">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 group-focus-within:text-indigo-500 transition-colors"></i>
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-base hover:bg-indigo-700 transition-all shadow-xl shadow-indigo-100 active:scale-[0.98] mt-2 flex items-center justify-center gap-2">
                Se connecter
                <i data-lucide="chevron-right" class="w-5 h-5"></i>
            </button>
        </form>

        <footer class="text-center text-slate-500 text-xs sm:text-sm mt-8">
            Nouveau ici ? <a href="register.html" class="text-indigo-600 font-bold hover:underline">Créer un compte</a>
        </footer>
    </main>

    <div id="loader" class="fixed inset-0 bg-white/90 backdrop-blur-sm hidden flex-col items-center justify-center z-50 p-6 text-center">
        <div class="w-14 h-14 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-indigo-600 text-lg">Authentification...</p>
    </div>

    <script type="module">
        // 1. IMPORTATION DES MODULES FIREBASE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // 2. TA CONFIGURATION RÉELLE
        const firebaseConfig = {
            apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
            authDomain: "unimarket-d6259.firebaseapp.com",
            projectId: "unimarket-d6259",
            storageBucket: "unimarket-d6259.firebasestorage.app",
            messagingSenderId: "236655322274",
            appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb"
        };

        // 3. INITIALISATION
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        lucide.createIcons();

        const form = document.getElementById('login-form');
        const loader = document.getElementById('loader');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            loader.classList.remove('hidden');
            loader.classList.add('flex');

            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;

            try {
                // Tentative de connexion
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // VÉRIFICATION DE L'EMAIL (Sécurité UnivMarket)
                if (!user.emailVerified) {
                    loader.classList.add('hidden');
                    alert("⚠️ Ton email n'est pas encore vérifié ! Merci de cliquer sur le lien envoyé dans ta boîte mail avant de te connecter.");
                    await signOut(auth); // On le déconnecte tant qu'il n'est pas vérifié
                } else {
                    // Succès total : Direction l'accueil
                    window.location.href = 'index.html';
                }

            } catch (error) {
                loader.classList.add('hidden');
                let message = "Identifiants incorrects.";
                
                if (error.code === 'auth/user-not-found') message = "Aucun compte trouvé avec cet email.";
                if (error.code === 'auth/wrong-password') message = "Mot de passe incorrect.";
                if (error.code === 'auth/too-many-requests') message = "Trop de tentatives. Réessaye plus tard.";
                
                alert(message + " (" + error.code + ")");
            }
        });
    </script>
</body>
</html>
