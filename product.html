<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Détails | UnivMarket</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-20">

    <nav class="glass-nav border-b border-slate-100 sticky top-0 z-50 px-4 py-4">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <button onclick="location.href='index.html'" class="p-2.5 hover:bg-slate-100 rounded-2xl transition-all">
                <i data-lucide="arrow-left" class="w-6 h-6 text-slate-600"></i>
            </button>
            <span class="font-black text-xl tracking-tighter uppercase">Univ<span class="text-indigo-600">Market</span></span>
            <button id="share-top-btn" class="p-2.5 hover:bg-indigo-50 rounded-2xl transition-all text-indigo-600">
                <i data-lucide="share-2" class="w-5 h-5"></i>
            </button>
        </div>
    </nav>

    <main id="product-container" class="max-w-6xl mx-auto px-4 mt-8 hidden">
        <div class="flex flex-col lg:flex-row gap-8 lg:gap-12">
            
            <div class="lg:w-3/5">
                <div class="bg-white rounded-[2.5rem] p-2 shadow-sm border border-slate-100">
                    <img id="p-img" src="" class="w-full aspect-square object-cover rounded-[2.2rem] bg-slate-100">
                </div>
            </div>

            <div class="lg:w-2/5 space-y-6">
                <div class="space-y-2">
                    <span id="p-category" class="inline-block px-3 py-1 bg-indigo-50 text-indigo-600 rounded-lg text-[10px] font-extrabold uppercase tracking-widest"></span>
                    <h1 id="p-title" class="text-3xl font-black text-slate-900 leading-tight"></h1>
                    <div class="flex items-center gap-2 text-slate-400">
                        <i data-lucide="map-pin" class="w-4 h-4"></i>
                        <span id="p-univ" class="text-sm font-bold uppercase tracking-wide"></span>
                    </div>
                    <p id="p-price" class="text-4xl font-black text-indigo-600 pt-2"></p>
                </div>

                <div class="p-6 bg-white rounded-[2rem] border border-slate-100 shadow-sm">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2 mb-3">
                        <i data-lucide="info" class="w-5 h-5 text-indigo-500"></i> Description
                    </h3>
                    <p id="p-desc" class="text-slate-500 leading-relaxed font-medium text-sm"></p>
                </div>

                <div class="p-8 bg-slate-900 rounded-[2.5rem] text-white shadow-2xl">
                    <div class="flex items-center gap-4 mb-8">
                        <div id="p-seller-initial" class="w-14 h-14 rounded-2xl bg-indigo-600 flex items-center justify-center font-black text-2xl border-2 border-white/10"></div>
                        <div>
                            <p class="text-indigo-300 text-[10px] font-black uppercase tracking-widest">Propriétaire</p>
                            <p id="p-seller-name" class="font-bold text-xl"></p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 gap-4">
                        <button id="p-wa-btn" class="w-full bg-[#25D366] text-white py-4 rounded-2xl font-black flex items-center justify-center gap-3 hover:scale-[1.02] transition-all shadow-lg shadow-green-500/10">
                            <i data-lucide="message-circle" class="w-6 h-6 fill-current"></i>
                            WhatsApp
                        </button>
                        
                        <a id="p-call-btn" href="#" class="w-full bg-white text-slate-900 py-4 rounded-2xl font-black flex items-center justify-center gap-3 hover:bg-slate-100 transition-all">
                            <i data-lucide="phone" class="w-6 h-6 text-indigo-600"></i>
                            Appeler
                        </a>
                    </div>

                    <button id="report-btn" class="w-full mt-6 py-2 text-red-400 text-xs font-bold uppercase tracking-widest hover:text-red-300 transition-colors flex items-center justify-center gap-2">
                        <i data-lucide="shield-alert" class="w-4 h-4"></i>
                        Signaler cette annonce
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="loading-state" class="flex flex-col items-center justify-center py-40">
        <div class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
            authDomain: "unimarket-d6259.firebaseapp.com",
            projectId: "unimarket-d6259",
            storageBucket: "unimarket-d6259.firebasestorage.app",
            messagingSenderId: "236655322274",
            appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        lucide.createIcons();

        const productId = new URLSearchParams(window.location.search).get('id');
        if (!productId) window.location.href = 'index.html';

        async function loadProduct() {
            try {
                const snap = await getDoc(doc(db, "products", productId));
                
                if (snap.exists()) {
                    const p = snap.data();
                    
                    document.getElementById('p-title').textContent = p.title;
                    document.getElementById('p-price').textContent = `${Number(p.price).toLocaleString()} FCFA`;
                    document.getElementById('p-desc').textContent = p.description;
                    document.getElementById('p-category').textContent = p.category;
                    document.getElementById('p-univ').textContent = p.university;
                    document.getElementById('p-img').src = p.imageUrl;
                    document.getElementById('p-seller-name').textContent = p.sellerName;
                    document.getElementById('p-seller-initial').textContent = p.sellerName.charAt(0).toUpperCase();

                    // Contact
                    let phone = p.sellerPhone || "22900000000"; // Fallback
                    let cleanPhone = phone.replace(/\s/g, '');
                    if(cleanPhone.length === 8) cleanPhone = "229" + cleanPhone;

                    document.getElementById('p-wa-btn').onclick = () => {
                        window.open(`https://wa.me/${cleanPhone}?text=Interessé par ${p.title}`, '_blank');
                    };
                    document.getElementById('p-call-btn').href = `tel:+${cleanPhone}`;

                    // Logique de Signalement
                    document.getElementById('report-btn').onclick = async () => {
                        if(confirm("Signaler cette annonce pour contenu inapproprié ou fraude ?")) {
                            try {
                                await updateDoc(doc(db, "products", productId), {
                                    reports: arrayUnion(Date.now())
                                });
                                alert("Merci. L'annonce sera vérifiée par l'équipe UnivMarket.");
                            } catch(e) { alert("Erreur lors du signalement."); }
                        }
                    };

                    document.getElementById('loading-state').classList.add('hidden');
                    document.getElementById('product-container').classList.remove('hidden');
                    lucide.createIcons();
                }
            } catch (err) {
                console.error(err);
                alert("Erreur de permission Firestore. Vérifie tes règles de sécurité !");
            }
        }

        loadProduct();
    </script>
</body>
</html>
