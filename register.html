<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Créer un compte | UnivMarket</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        input, select { font-size: 16px !important; }
        .auth-card { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 sm:p-6 text-slate-900">

    <main id="register-container" class="auth-card w-full max-w-lg bg-white rounded-[2.5rem] shadow-2xl shadow-indigo-100/50 p-6 sm:p-10 border border-slate-100 relative overflow-hidden">
        
        <header class="text-center mb-8 relative">
            <div class="inline-flex p-3.5 bg-indigo-600 rounded-2xl text-white mb-4 shadow-xl shadow-indigo-200">
                <i data-lucide="user-plus" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-800 tracking-tight">Rejoindre UnivMarket</h1>
            <p class="text-slate-500 text-sm mt-2">Crée ton profil pour vendre sur le campus.</p>
        </header>

        <form id="register-form" class="space-y-4">
            <div class="space-y-1">
                <label class="block text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Identité</label>
                <div class="relative group">
                    <input type="text" id="reg-name" placeholder="Nom & Prénoms" required
                           class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none transition-all text-sm">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Email</label>
                    <div class="relative">
                        <input type="email" id="reg-email" placeholder="etudiant@uac.bj" required
                               class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    </div>
                </div>
                <div class="space-y-1">
                    <label class="block text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">WhatsApp</label>
                    <div class="relative">
                        <input type="tel" id="reg-phone" placeholder="+229 01..." required
                               class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                        <i data-lucide="phone" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Ton Université</label>
                <div class="relative">
                    <select id="reg-university" required
                            class="w-full pl-11 pr-10 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none appearance-none text-sm">
                        <option value="">Où étudies-tu ?</option>
                        <optgroup label="Universités Nationales">
                            <option value="UAC">UAC (Abomey-Calavi)</option>
                            <option value="UP">UP (Porto-Novo)</option>
                            <option value="UNSTIM">UNSTIM (Abomey)</option>
                            <option value="UPARAKOU">Université de Parakou</option>
                        </optgroup>
                        <optgroup label="Grandes Écoles & Instituts">
                            <option value="ENEAM">ENEAM</option>
                            <option value="EPAC">EPAC</option>
                            <option value="ENAM">ENAM</option>
                            <option value="IFRI">IFRI</option>
                            <option value="EGM">École de Génie Militaire</option>
                            <option value="IUT">IUT (Lokossa)</option>
                        </optgroup>
                        <optgroup label="Écoles Privées">
                            <option value="ESM">ESM-Benin</option>
                            <option value="Pigier">Pigier Bénin</option>
                            <option value="UATM">UATM (Gasa Formation)</option>
                            <option value="ISM">ISM Adonai</option>
                            <option value="IUA">IUA</option>
                        </optgroup>
                    </select>
                    <i data-lucide="graduation-cap" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                </div>
            </div>

            <div class="space-y-1">
                <label class="block text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Sécurité</label>
                <div class="relative">
                    <input type="password" id="reg-pass" placeholder="6 caractères minimum" required
                           class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none text-sm">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                </div>
            </div>

            <button type="submit" class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-bold text-base hover:bg-indigo-700 transition-all shadow-xl active:scale-[0.98] mt-2">
                Créer mon compte
            </button>
        </form>

        <p class="text-center text-slate-500 text-xs sm:text-sm mt-8">
            Déjà inscrit ? <a href="login.html" class="text-indigo-600 font-bold hover:underline">Se connecter</a>
        </p>
    </main>

    <div id="loader" class="fixed inset-0 bg-white/90 backdrop-blur-sm hidden flex-col items-center justify-center z-50 p-6 text-center">
        <div class="w-14 h-14 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-indigo-600">Création de ton profil étudiant...</p>
    </div>

    <script type="module">
        // 1. IMPORTATION DES MODULES FIREBASE
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 2. TA CONFIGURATION RÉELLE
        const firebaseConfig = {
            apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
            authDomain: "unimarket-d6259.firebaseapp.com",
            projectId: "unimarket-d6259",
            storageBucket: "unimarket-d6259.firebasestorage.app",
            messagingSenderId: "236655322274",
            appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb"
        };

        // 3. INITIALISATION
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        lucide.createIcons();

        const form = document.getElementById('register-form');
        const loader = document.getElementById('loader');
        const container = document.getElementById('register-container');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            loader.classList.remove('hidden');
            loader.classList.add('flex');

            const name = document.getElementById('reg-name').value;
            const email = document.getElementById('reg-email').value;
            const phone = document.getElementById('reg-phone').value;
            const univ = document.getElementById('reg-university').value;
            const pass = document.getElementById('reg-pass').value;

            try {
                // Étape 1: Création du compte dans Firebase Auth
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // Étape 2: Mise à jour du nom
                await updateProfile(user, { displayName: name });

                // Étape 3: Envoi du mail de vérification (VITAL)
                await sendEmailVerification(user);

                // Étape 4: Sauvegarde des infos supplémentaires dans Firestore
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    displayName: name,
                    email: email,
                    whatsapp: phone,
                    university: univ,
                    createdAt: serverTimestamp(),
                    isVerified: false
                });

                // Succès : Interface de confirmation
                loader.classList.add('hidden');
                container.innerHTML = `
                    <div class="text-center py-6 animate-slide-up">
                        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i data-lucide="mail-check" class="w-10 h-10"></i>
                        </div>
                        <h2 class="text-2xl font-bold text-slate-800">Compte créé !</h2>
                        <p class="text-slate-500 mt-4 text-sm px-4">
                            Un email de vérification a été envoyé à <b>${email}</b>.<br><br>
                            Vérifie ta boîte de réception (et tes spams) pour activer ton compte avant de te connecter.
                        </p>
                        <button onclick="window.location.href='login.html'" class="w-full mt-8 bg-indigo-600 text-white py-4 rounded-2xl font-bold shadow-lg shadow-indigo-100">
                            Aller à la connexion
                        </button>
                    </div>
                `;
                lucide.createIcons();

            } catch (error) {
                loader.classList.add('hidden');
                let message = "Erreur lors de l'inscription.";
                if (error.code === 'auth/email-already-in-use') message = "Cet email est déjà utilisé.";
                if (error.code === 'auth/weak-password') message = "Le mot de passe doit faire au moins 6 caractères.";
                alert(message + " (" + error.code + ")");
            }
        });
    </script>
</body>
</html>
