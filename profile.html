<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Profil | UnivMarket</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .profile-gradient { background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
        .product-card:hover { transform: translateY(-5px); transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 pb-12">

    <nav class="bg-white/80 border-b border-slate-200 px-4 py-4 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <button onclick="location.href='index.html'" class="p-2.5 hover:bg-slate-100 rounded-2xl transition-all active:scale-90 border border-transparent hover:border-slate-200">
                <i data-lucide="arrow-left" class="w-5 h-5 text-slate-600"></i>
            </button>
            <h1 class="text-sm font-extrabold uppercase tracking-widest text-slate-400">Espace Membre</h1>
            <button id="logout-btn" class="p-2.5 hover:bg-red-50 rounded-2xl transition-all group border border-transparent hover:border-red-100">
                <i data-lucide="log-out" class="w-5 h-5 text-red-500 group-hover:translate-x-1 transition-transform"></i>
            </button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 mt-6">
        
        <section class="bg-white rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden mb-8">
            <div class="profile-gradient h-36 w-full relative">
                <div class="absolute inset-0 opacity-20 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')]"></div>
            </div>
            <div class="px-8 pb-8">
                <div class="relative -top-12 flex flex-col md:flex-row md:items-end gap-6">
                    <div class="relative group">
                        <img id="user-img" src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" 
                             class="w-28 h-28 md:w-40 md:h-40 rounded-[2.5rem] border-8 border-white shadow-xl object-cover bg-white">
                        <div class="absolute bottom-2 right-2 p-2 bg-white rounded-xl shadow-lg border border-slate-100 cursor-pointer hover:scale-110 transition-transform">
                            <i data-lucide="camera" class="w-4 h-4 text-indigo-600"></i>
                        </div>
                    </div>
                    
                    <div class="md:pb-4 flex-1">
                        <div class="flex items-center gap-2">
                            <h2 id="user-name" class="text-3xl font-black text-slate-800 tracking-tight">Chargement...</h2>
                            <i data-lucide="check-circle-2" class="w-5 h-5 text-blue-500 fill-blue-50"></i>
                        </div>
                        <p id="user-email" class="text-slate-400 font-medium italic mt-1">...</p>
                    </div>

                    <div class="flex gap-2 md:pb-4">
                        <button onclick="location.href='edit-profile.html'" class="bg-slate-900 text-white px-6 py-3 rounded-2xl font-bold hover:bg-indigo-600 transition-all text-sm shadow-lg shadow-slate-200 active:scale-95">
                            Modifier le profil
                        </button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="flex items-center gap-4 bg-slate-50/50 p-5 rounded-3xl border border-slate-100">
                        <div class="p-3 bg-white shadow-sm text-indigo-600 rounded-2xl"><i data-lucide="graduation-cap" class="w-6 h-6"></i></div>
                        <div>
                            <p class="text-[10px] uppercase font-black text-slate-400 tracking-wider">Université</p>
                            <p id="user-university" class="text-sm font-bold text-slate-700">Chargement...</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 bg-slate-50/50 p-5 rounded-3xl border border-slate-100">
                        <div class="p-3 bg-white shadow-sm text-emerald-600 rounded-2xl"><i data-lucide="phone" class="w-6 h-6"></i></div>
                        <div>
                            <p class="text-[10px] uppercase font-black text-slate-400 tracking-wider">WhatsApp</p>
                            <p id="user-phone" class="text-sm font-bold text-slate-700">Chargement...</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-4 bg-slate-50/50 p-5 rounded-3xl border border-slate-100">
                        <div class="p-3 bg-white shadow-sm text-amber-600 rounded-2xl"><i data-lucide="package" class="w-6 h-6"></i></div>
                        <div>
                            <p class="text-[10px] uppercase font-black text-slate-400 tracking-wider">Publications</p>
                            <p id="user-ads-count" class="text-sm font-bold text-slate-700">0 active(s)</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section>
            <div class="flex items-center justify-between mb-8 px-2">
                <div>
                    <h3 class="text-2xl font-black text-slate-800">Mes annonces</h3>
                    <p class="text-slate-400 text-sm font-medium">Gérez vos articles en vente</p>
                </div>
                <button onclick="location.href='add-product.html'" class="p-3 bg-indigo-50 text-indigo-600 rounded-2xl hover:bg-indigo-600 hover:text-white transition-all">
                    <i data-lucide="plus" class="w-6 h-6"></i>
                </button>
            </div>

            <div id="my-products-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8">
                <div class="animate-pulse bg-white rounded-[2rem] h-72 border border-slate-100"></div>
                <div class="animate-pulse bg-white rounded-[2rem] h-72 border border-slate-100"></div>
                <div class="animate-pulse bg-white rounded-[2rem] h-72 border border-slate-100"></div>
            </div>
            
            <div id="empty-state" class="hidden text-center py-24 bg-white rounded-[3rem] border-2 border-dashed border-slate-100">
                <div class="bg-slate-50 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-6">
                    <i data-lucide="shopping-bag" class="w-10 h-10 text-slate-300"></i>
                </div>
                <h4 class="text-xl font-bold text-slate-800">Rien à vendre ?</h4>
                <p class="text-slate-400 mt-2 max-w-xs mx-auto">Commencez à gagner de l'argent en vendant ce que vous n'utilisez plus.</p>
                <a href="add-product.html" class="inline-block mt-8 bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg shadow-indigo-100 active:scale-95 transition-all">
                    Publier une annonce
                </a>
            </div>
        </section>

    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, collection, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
            authDomain: "unimarket-d6259.firebaseapp.com",
            projectId: "unimarket-d6259",
            storageBucket: "unimarket-d6259.firebasestorage.app",
            messagingSenderId: "236655322274",
            appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        lucide.createIcons();

        // UI Refs
        const UI = {
            name: document.getElementById('user-name'),
            email: document.getElementById('user-email'),
            img: document.getElementById('user-img'),
            phone: document.getElementById('user-phone'),
            univ: document.getElementById('user-university'),
            count: document.getElementById('user-ads-count'),
            grid: document.getElementById('my-products-grid'),
            empty: document.getElementById('empty-state')
        };

        onAuthStateChanged(auth, async (user) => {
    if (user) {
        // Infos de base Auth
        UI.name.textContent = user.displayName || "Étudiant Béninois";
        UI.email.textContent = user.email;
        if (user.photoURL) UI.img.src = user.photoURL;

        // --- RÉCUPÉRATION DU NUMÉRO DEPUIS FIRESTORE ---
        try {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const userData = userDoc.data();
                
                // On cherche 'whatsapp' ou 'phone' dans ton document Firestore
                const phoneValue = userData.whatsapp || userData.phone || "Non renseigné";
                UI.phone.textContent = phoneValue;
                
                // Mise à jour de l'université
                UI.univ.textContent = userData.university || "UAC / Autre";
            } else {
                UI.phone.textContent = "À compléter";
                UI.univ.textContent = "À compléter";
            }
        } catch (e) { 
            console.error("Erreur Firestore:", e);
            UI.phone.textContent = "Erreur de lecture";
        }

        // Chargement des annonces
        loadProducts(user.uid);
    } else {
        window.location.href = 'login.html';
    }
});

                
        async function loadProducts(uid) {
            try {
                const q = query(collection(db, "products"), where("sellerId", "==", uid));
                const snap = await getDocs(q);
                
                UI.grid.innerHTML = "";
                UI.count.textContent = `${snap.size} active(s)`;

                if (snap.empty) {
                    UI.empty.classList.remove('hidden');
                    return;
                }

                snap.forEach((docSnap) => {
                    const p = docSnap.data();
                    const card = document.createElement('div');
                    card.className = "product-card bg-white rounded-[2rem] border border-slate-100 overflow-hidden shadow-sm p-3 group";
                    card.innerHTML = `
                        <div class="aspect-square rounded-[1.5rem] overflow-hidden bg-slate-100 relative">
                            <img src="${p.imageUrl || 'https://via.placeholder.com/400'}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                            <div class="absolute top-3 right-3 flex gap-1">
                                <button onclick="window.deleteAd('${docSnap.id}')" class="p-2 bg-white/90 backdrop-blur rounded-xl text-red-500 hover:bg-red-500 hover:text-white transition-all shadow-sm">
                                    <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                            </div>
                        </div>
                        <div class="p-3">
                            <h4 class="font-bold text-slate-800 line-clamp-1">${p.title}</h4>
                            <div class="flex items-center justify-between mt-2">
                                <p class="text-indigo-600 font-black text-lg">${p.price} <span class="text-[10px] font-bold">FCFA</span></p>
                                <button onclick="location.href='edit-product.html?id=${docSnap.id}'" class="text-[10px] font-black uppercase tracking-tighter text-slate-400 hover:text-indigo-600 transition-colors">Modifier</button>
                            </div>
                        </div>
                    `;
                    UI.grid.appendChild(card);
                });
                lucide.createIcons();
            } catch (e) { console.error(e); }
        }

        // Global Delete Function
        window.deleteAd = async (id) => {
            if (confirm("Supprimer définitivement cette annonce ?")) {
                try {
                    await deleteDoc(doc(db, "products", id));
                    location.reload();
                } catch (e) { alert("Erreur lors de la suppression"); }
            }
        };

        // Logout
        document.getElementById('logout-btn').onclick = () => {
            signOut(auth).then(() => window.location.href = 'index.html');
        };
    </script>
</body>
</html>
