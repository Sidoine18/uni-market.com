<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Détails | UnivMarket</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; -webkit-tap-highlight-color: transparent; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(20px); }
        .product-img { view-transition-name: product-image; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-24">

    <nav class="glass-nav border-b border-slate-100 sticky top-0 z-50 px-4 py-3">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <button onclick="location.href='index.html'" class="p-3 hover:bg-slate-100 rounded-2xl transition-all active:scale-90">
                <i data-lucide="chevron-left" class="w-6 h-6 text-slate-900"></i>
            </button>
            <div class="flex flex-col items-center">
                <span class="font-black text-sm tracking-tighter uppercase leading-none text-slate-400">UnivMarket</span>
                <span class="text-[10px] font-bold text-indigo-600 uppercase tracking-widest mt-1">Détails de l'article</span>
            </div>
            <button id="share-btn" class="p-3 bg-indigo-50 text-indigo-600 rounded-2xl transition-all hover:bg-indigo-100 active:scale-90">
                <i data-lucide="share" class="w-5 h-5"></i>
            </button>
        </div>
    </nav>

    <main id="product-container" class="max-w-5xl mx-auto px-4 mt-6 hidden opacity-0 transition-opacity duration-500">
        <div class="flex flex-col lg:flex-row gap-8 lg:gap-16">
            
            <div class="lg:w-1/2">
                <div class="relative group">
                    <div class="absolute inset-0 bg-indigo-200 rounded-[3rem] blur-2xl opacity-20 group-hover:opacity-30 transition-opacity"></div>
                    <img id="p-img" src="" class="relative w-full aspect-[4/5] object-cover rounded-[2.5rem] shadow-2xl shadow-indigo-100/50 border-4 border-white">
                    <div id="p-category-badge" class="absolute top-6 left-6 px-4 py-2 bg-white/90 backdrop-blur shadow-xl rounded-2xl text-[10px] font-black text-indigo-600 uppercase tracking-widest border border-white/50"></div>
                </div>
            </div>

            <div class="lg:w-1/2 space-y-8 animate-fade">
                <div class="space-y-4">
                    <h1 id="p-title" class="text-4xl font-black text-slate-900 leading-[1.1] tracking-tight"></h1>
                    
                    <div class="flex flex-wrap items-center gap-4">
                        <div class="flex items-center gap-2 bg-slate-200/50 px-3 py-1.5 rounded-full text-slate-500">
                            <i data-lucide="map-pin" class="w-4 h-4 text-indigo-500"></i>
                            <span id="p-univ" class="text-xs font-bold uppercase tracking-wide"></span>
                        </div>
                        <div class="flex items-center gap-2 bg-indigo-600 text-white px-4 py-1.5 rounded-full shadow-lg shadow-indigo-200">
                            <span id="p-price" class="text-lg font-black tracking-tight"></span>
                        </div>
                    </div>
                </div>

                <div class="p-8 bg-white rounded-[2.5rem] border border-slate-100 shadow-sm relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-5">
                        <i data-lucide="quote" class="w-12 h-12"></i>
                    </div>
                    <h3 class="font-black text-slate-800 text-xs uppercase tracking-[0.2em] mb-4 flex items-center gap-2">
                        Description
                    </h3>
                    <p id="p-desc" class="text-slate-500 leading-relaxed font-medium text-base whitespace-pre-wrap italic"></p>
                </div>

                <div class="p-8 bg-slate-900 rounded-[3rem] text-white shadow-2xl shadow-indigo-900/20 relative overflow-hidden">
                    <div class="flex items-center gap-5 mb-10 relative z-10">
                        <div id="p-seller-initial" class="w-16 h-16 rounded-[1.5rem] bg-gradient-to-br from-indigo-500 to-indigo-700 flex items-center justify-center font-black text-2xl border-2 border-white/20 shadow-inner"></div>
                        <div>
                            <p class="text-indigo-400 text-[10px] font-black uppercase tracking-[0.2em] mb-1">Vendeur vérifié</p>
                            <p id="p-seller-name" class="font-extrabold text-2xl leading-none"></p>
                        </div>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 relative z-10">
                        <button id="p-wa-btn" class="group w-full bg-[#25D366] text-white py-5 rounded-[1.5rem] font-black flex items-center justify-center gap-3 hover:shadow-xl hover:shadow-green-500/20 active:scale-95 transition-all">
                            <i data-lucide="message-circle" class="w-6 h-6 fill-current"></i>
                            WhatsApp
                        </button>
                        
                        <a id="p-call-btn" href="#" class="w-full bg-white/10 backdrop-blur text-white border border-white/10 py-5 rounded-[1.5rem] font-black flex items-center justify-center gap-3 hover:bg-white hover:text-slate-900 active:scale-95 transition-all">
                            <i data-lucide="phone" class="w-6 h-6"></i>
                            Appeler
                        </a>
                    </div>

                    <button id="report-btn" class="w-full mt-8 py-2 text-slate-500 text-[10px] font-bold uppercase tracking-widest hover:text-red-400 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="shield-alert" class="w-4 h-4"></i>
                        Signaler un problème
                    </button>
                </div>
            </div>
        </div>
    </main>

    <div id="loading-state" class="fixed inset-0 bg-slate-50 flex flex-col items-center justify-center z-[100]">
        <div class="relative">
            <div class="w-20 h-20 border-4 border-indigo-100 rounded-full"></div>
            <div class="absolute top-0 w-20 h-20 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
        </div>
        <p class="mt-6 font-black text-slate-400 uppercase tracking-widest text-[10px]">Chargement UnivMarket...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
            authDomain: "unimarket-d6259.firebaseapp.com",
            projectId: "unimarket-d6259",
            storageBucket: "unimarket-d6259.firebasestorage.app",
            messagingSenderId: "236655322274",
            appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        lucide.createIcons();

        const productId = new URLSearchParams(window.location.search).get('id');
        if (!productId) window.location.href = 'index.html';

        async function loadProduct() {
            try {
                const snap = await getDoc(doc(db, "products", productId));
                
                if (snap.exists()) {
                    const p = snap.data();
                    
                    document.getElementById('p-title').textContent = p.title;
                    document.getElementById('p-price').textContent = `${Number(p.price).toLocaleString()} FCFA`;
                    document.getElementById('p-desc').textContent = p.description;
                    document.getElementById('p-category-badge').textContent = p.category;
                    document.getElementById('p-univ').textContent = p.university;
                    document.getElementById('p-img').src = p.imageUrl;
                    document.getElementById('p-seller-name').textContent = p.sellerName;
                    document.getElementById('p-seller-initial').textContent = p.sellerName.charAt(0).toUpperCase();

                    // GESTION DU PARTAGE COOL
                    const shareBtn = document.getElementById('share-btn');
                    shareBtn.onclick = async () => {
                        const shareData = {
                            title: p.title + " | UnivMarket",
                            text: `Regarde ce que j'ai trouvé sur UnivMarket : ${p.title} à ${p.price} FCFA !`,
                            url: window.location.href
                        };

                        if (navigator.share) {
                            try { await navigator.share(shareData); } catch (e) {}
                        } else {
                            // Fallback : Copie du lien si navigator.share n'est pas dispo (PC)
                            navigator.clipboard.writeText(window.location.href);
                            shareBtn.innerHTML = '<i data-lucide="check" class="w-5 h-5"></i>';
                            lucide.createIcons();
                            setTimeout(() => {
                                shareBtn.innerHTML = '<i data-lucide="share" class="w-5 h-5"></i>';
                                lucide.createIcons();
                            }, 2000);
                        }
                    };

                    // Contact WhatsApp Clean
                    let phone = p.sellerPhone || "22900000000";
                    let cleanPhone = phone.replace(/\s/g, '').replace('+', '');
                    if(cleanPhone.length === 8) cleanPhone = "229" + cleanPhone;

                    document.getElementById('p-wa-btn').onclick = () => {
                        const text = encodeURIComponent(`Salut ${p.sellerName}, je t'écris depuis UnivMarket pour ton annonce : *${p.title}* (${p.price} FCFA). Toujours dispo ?`);
                        window.open(`https://wa.me/${cleanPhone}?text=${text}`, '_blank');
                    };
                    document.getElementById('p-call-btn').href = `tel:+${cleanPhone}`;

                    // Affichage final fluide
                    document.getElementById('loading-state').classList.add('hidden');
                    const container = document.getElementById('product-container');
                    container.classList.remove('hidden');
                    setTimeout(() => container.classList.replace('opacity-0', 'opacity-100'), 50);
                    
                    lucide.createIcons();
                } else {
                    window.location.href = 'index.html';
                }
            } catch (err) {
                console.error(err);
                alert("Erreur de chargement. Vérifie ta connexion.");
            }
        }

        loadProduct();
    </script>
</body>
</html>
