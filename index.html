<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnivMarket | Le Marché Étudiant Béninois</title>

    <!-- Open Graph (couverture WhatsApp, Facebook...) -->
    <meta property="og:title" content="UnivMarket | Le Marché Étudiant Béninois">
    <meta property="og:description" content="Achète et vends facilement entre étudiants au Bénin avec UnivMarket.">
    <meta property="og:image" content="https://univ-market.vercel.app/cover.png">
    <meta property="og:url" content="https://univ-market.vercel.app/">
    <meta property="og:type" content="website">

    <!-- Bonus pour WhatsApp / Twitter -->
    <meta name="twitter:card" content="summary_large_image">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .category-pill.active { background-color: #4f46e5; color: white; box-shadow: 0 10px 15px -3px rgba(79, 70, 229, 0.4); }
        .product-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .product-card:hover { transform: translateY(-5px); }
        ::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">

    <nav class="bg-white/80 border-b border-slate-100 sticky top-0 z-50 backdrop-blur-md">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 group">
                <div class="bg-indigo-600 p-2 rounded-xl text-white shadow-lg shadow-indigo-100">
                    <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                </div>
                <span class="font-extrabold text-2xl tracking-tighter">Univ<span class="text-indigo-600">Market</span></span>
            </a>

            <div id="nav-auth" class="flex items-center gap-4">
                <div class="animate-pulse bg-slate-100 h-10 w-24 rounded-xl"></div>
            </div>
        </div>
    </nav>

    <header class="bg-white px-4 pt-10 pb-6">
        <div class="max-w-4xl mx-auto text-center">
            <h1 class="text-3xl sm:text-5xl font-black text-slate-900 mb-6 leading-tight">
                Trouve tout ce qu'il te faut <br><span class="text-indigo-600 text-2xl sm:text-4xl">sur ton campus.</span>
            </h1>
            <div class="relative max-w-2xl mx-auto">
                <input type="text" id="search-input" placeholder="Ordinateur, livre, chambre..." 
                       class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                <i data-lucide="search" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 w-5 h-5"></i>
            </div>
        </div>
    </header>

    <div class="bg-white border-b border-slate-50 sticky top-20 z-40">
        <div class="max-w-7xl mx-auto px-4 py-4 flex gap-3 overflow-x-auto no-scrollbar" id="category-filters">
            <button class="category-pill active whitespace-nowrap px-6 py-2.5 rounded-full text-sm font-bold bg-slate-100 text-slate-600 transition-all hover:bg-slate-200" data-cat="all">Tout</button>
            <button class="category-pill whitespace-nowrap px-6 py-2.5 rounded-full text-sm font-bold bg-slate-100 text-slate-600 transition-all hover:bg-slate-200" data-cat="Informatique">Informatique</button>
            <button class="category-pill whitespace-nowrap px-6 py-2.5 rounded-full text-sm font-bold bg-slate-100 text-slate-600 transition-all hover:bg-slate-200" data-cat="Livres">Livres & Cours</button>
            <button class="category-pill whitespace-nowrap px-6 py-2.5 rounded-full text-sm font-bold bg-slate-100 text-slate-600 transition-all hover:bg-slate-200" data-cat="Logement">Logement</button>
            <button class="category-pill whitespace-nowrap px-6 py-2.5 rounded-full text-sm font-bold bg-slate-100 text-slate-600 transition-all hover:bg-slate-200" data-cat="Mode">Mode</button>
            <button class="category-pill whitespace-nowrap px-6 py-2.5 rounded-full text-sm font-bold bg-slate-100 text-slate-600 transition-all hover:bg-slate-200" data-cat="Services">Services</button>
        </div>
    </div>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-xl font-black text-slate-800 uppercase tracking-widest" id="grid-title">Toutes les annonces</h2>
            <button id="btn-sell" class="bg-indigo-600 text-white px-5 py-3 rounded-2xl font-bold flex items-center gap-2 hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 active:scale-95">
                <i data-lucide="plus" class="w-5 h-5"></i> Vendre
            </button>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6" id="products-grid">
            <div class="h-80 bg-white rounded-3xl animate-pulse"></div>
            <div class="h-80 bg-white rounded-3xl animate-pulse"></div>
            <div class="h-80 bg-white rounded-3xl animate-pulse"></div>
            <div class="h-80 bg-white rounded-3xl animate-pulse"></div>
        </div>

        <div id="no-results" class="hidden text-center py-20 bg-white rounded-[3rem] border border-dashed border-slate-200">
            <i data-lucide="package-search" class="w-16 h-16 mx-auto text-slate-300 mb-4"></i>
            <h3 class="text-lg font-bold text-slate-600">Aucun produit ne correspond à ta recherche</h3>
        </div>
    </main>

    <footer class="text-center py-10 border-t border-slate-100 text-slate-400 text-xs font-bold uppercase tracking-widest">
        &copy; 2026 UnivMarket | Made for Benin Students 🇧🇯
    </footer>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, orderBy, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
            authDomain: "unimarket-d6259.firebaseapp.com",
            projectId: "unimarket-d6259",
            storageBucket: "unimarket-d6259.firebasestorage.app",
            messagingSenderId: "236655322274",
            appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        lucide.createIcons();

        const grid = document.getElementById('products-grid');
        const searchInput = document.getElementById('search-input');
        const categoryBtns = document.querySelectorAll('.category-pill');
        
        let allProducts = [];
        let currentCategory = "all";

        // 1. Gérer l'état de l'utilisateur
        onAuthStateChanged(auth, (user) => {
            const navAuth = document.getElementById('nav-auth');
            if (user) {
                navAuth.innerHTML = `
                    <div class="flex items-center gap-4">
                        <a href="profile.html" class="w-10 h-10 rounded-xl overflow-hidden border-2 border-indigo-100">
                            <img src="${user.photoURL || 'https://ui-avatars.com/api/?name='+user.email}" class="w-full h-full object-cover">
                        </a>
                        <button id="logout-btn" class="p-2 text-slate-400 hover:text-red-500 transition-colors">
                            <i data-lucide="log-out" class="w-5 h-5"></i>
                        </button>
                    </div>
                `;
                document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => location.reload());
            } else {
                navAuth.innerHTML = `<a href="login.html" class="bg-slate-900 text-white px-5 py-2.5 rounded-xl font-bold text-sm">Connexion</a>`;
            }
            lucide.createIcons();
        });

        // 2. Charger les produits
        async function loadProducts() {
            const q = query(collection(db, "products"), orderBy("createdAt", "desc"));
            const querySnapshot = await getDocs(q);
            allProducts = querySnapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
            filterAndRender();
        }

        // 3. Filtrer et Afficher
        function filterAndRender() {
            const searchTerm = searchInput.value.toLowerCase();
            
            const filtered = allProducts.filter(p => {
                const matchSearch = p.title.toLowerCase().includes(searchTerm) || p.description.toLowerCase().includes(searchTerm);
                const matchCat = currentCategory === "all" || p.category === currentCategory;
                return matchSearch && matchCat;
            });

            renderGrid(filtered);
        }

        function renderGrid(products) {
            grid.innerHTML = "";
            if (products.length === 0) {
                document.getElementById('no-results').classList.remove('hidden');
                return;
            }
            document.getElementById('no-results').classList.add('hidden');

            products.forEach(p => {
                const card = document.createElement('div');
                card.className = "product-card bg-white rounded-[2rem] border border-slate-100 p-3 shadow-sm hover:shadow-xl cursor-pointer";
                card.onclick = () => window.location.href = `product.html?id=${p.id}`;
                
                card.innerHTML = `
                    <div class="relative aspect-square rounded-[1.5rem] overflow-hidden bg-slate-50 mb-4">
                        <img src="${p.imageUrl}" class="w-full h-full object-cover">
                        <div class="absolute top-3 left-3 bg-white/90 backdrop-blur px-3 py-1.5 rounded-xl text-[10px] font-black text-indigo-600 uppercase">
                            ${p.university}
                        </div>
                    </div>
                    <div class="px-2">
                        <h3 class="font-bold text-slate-800 line-clamp-1 mb-1">${p.title}</h3>
                        <p class="text-indigo-600 font-black text-lg">${p.price.toLocaleString()} FCFA</p>
                        <div class="mt-3 pt-3 border-t border-slate-50 flex items-center justify-between">
                            <span class="text-[10px] text-slate-400 font-bold uppercase">${p.category}</span>
                            <i data-lucide="arrow-right" class="w-4 h-4 text-slate-300"></i>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        // Événements de filtre
        categoryBtns.forEach(btn => {
            btn.onclick = () => {
                categoryBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentCategory = btn.dataset.cat;
                document.getElementById('grid-title').textContent = currentCategory === "all" ? "Toutes les annonces" : currentCategory;
                filterAndRender();
            };
        });

        // Recherche temps réel
        searchInput.oninput = filterAndRender;

        // Bouton Vendre
        document.getElementById('btn-sell').onclick = () => {
            if (!auth.currentUser) {
                window.location.href = 'login.html';
            } else {
                window.location.href = 'add-product.html';
            }
        };

        loadProducts();
    </script>
</body>
</html>
