<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Connexion | UnivMarket</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .auth-card { animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .error-shake { animation: shake 0.4s cubic-bezier(.36,.07,.19,.97) both; }
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0); }
            20%, 80% { transform: translate3d(2px, 0, 0); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
            40%, 60% { transform: translate3d(4px, 0, 0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 sm:p-6 text-slate-900">

    <main id="auth-container" class="auth-card w-full max-w-md bg-white rounded-[3rem] shadow-2xl shadow-indigo-200/40 p-8 sm:p-12 border border-slate-100 relative">
        
        <header class="text-center mb-8">
            <div class="inline-flex p-4 bg-indigo-600 rounded-[1.5rem] text-white mb-6 shadow-xl shadow-indigo-100">
                <i data-lucide="log-in" class="w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight leading-none">Bon retour !</h1>
            <p class="text-slate-400 font-medium mt-3 italic">Le marché étudiant t'attend.</p>
        </header>

        <div id="error-container" class="hidden mb-6 p-4 rounded-2xl border flex flex-col gap-2 transition-all duration-300">
            <div class="flex items-center gap-3">
                <i id="error-icon" data-lucide="alert-circle" class="w-5 h-5"></i>
                <span id="error-message" class="text-sm font-bold tracking-tight"></span>
            </div>
            <button id="resend-email-btn" class="hidden text-xs underline font-black uppercase tracking-widest mt-1 text-left opacity-80 hover:opacity-100">
                Renvoyer le lien de vérification ?
            </button>
        </div>

        <form id="login-form" class="space-y-6">
            <div class="space-y-2">
                <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">Email Étudiant</label>
                <div class="relative">
                    <input type="email" id="login-email" placeholder="nom@exemple.com" required
                           class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-[1.2rem] outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all font-semibold text-slate-700">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-300"></i>
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex justify-between items-center px-1">
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-widest">Mot de passe</label>
                    <a href="forgot-password.html" class="text-[11px] font-extrabold text-indigo-600 hover:underline">Oublié ?</a>
                </div>
                <div class="relative">
                    <input type="password" id="login-pass" placeholder="••••••••" required
                           class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-[1.2rem] outline-none focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all font-semibold text-slate-700">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-300"></i>
                </div>
            </div>

            <button type="submit" class="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-black text-lg hover:bg-indigo-600 transition-all shadow-xl shadow-slate-200 active:scale-[0.97] mt-2 flex items-center justify-center gap-3">
                Se connecter
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </form>

        <footer class="text-center mt-10">
            <p class="text-slate-400 text-sm font-medium">
                Pas encore de compte ? <a href="register.html" class="text-indigo-600 font-extrabold hover:underline ml-1">Créer un profil</a>
            </p>
        </footer>
    </main>

    <div id="loader" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md hidden flex-col items-center justify-center z-50">
        <div class="bg-white p-8 rounded-[3rem] flex flex-col items-center shadow-2xl">
            <div class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-6 font-black text-slate-800 uppercase tracking-tighter">Vérification...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
            authDomain: "unimarket-d6259.firebaseapp.com",
            projectId: "unimarket-d6259",
            storageBucket: "unimarket-d6259.firebasestorage.app",
            messagingSenderId: "236655322274",
            appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        lucide.createIcons();

        const form = document.getElementById('login-form');
        const loader = document.getElementById('loader');
        const errorContainer = document.getElementById('error-container');
        const errorMessage = document.getElementById('error-message');
        const resendBtn = document.getElementById('resend-email-btn');

        function displayError(msg, type = "error") {
            loader.classList.add('hidden');
            loader.classList.remove('flex');
            
            errorContainer.classList.remove('hidden', 'bg-red-50', 'text-red-600', 'border-red-100', 'bg-amber-50', 'text-amber-700', 'border-amber-100');
            
            if (type === "error") {
                errorContainer.classList.add('bg-red-50', 'text-red-600', 'border-red-100', 'error-shake');
            } else {
                errorContainer.classList.add('bg-amber-50', 'text-amber-700', 'border-amber-100');
            }
            
            errorMessage.textContent = msg;
            
            // Retirer l'animation shake après 400ms
            setTimeout(() => errorContainer.classList.remove('error-shake'), 400);
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            errorContainer.classList.add('hidden');
            resendBtn.classList.add('hidden');
            loader.classList.remove('hidden');
            loader.classList.add('flex');

            const email = document.getElementById('login-email').value.trim();
            const pass = document.getElementById('login-pass').value;

            try {
                const userCredential = await signInWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                if (!user.emailVerified) {
                    displayError("Email non vérifié. Vérifie tes mails !", "warning");
                    resendBtn.classList.remove('hidden');
                    
                    // On définit l'action du bouton de renvoi
                    resendBtn.onclick = async () => {
    try {
        resendBtn.textContent = "⏳ Envoi en cours...";
        resendBtn.style.pointerEvents = "none"; 

        // 1. Authentification pour avoir les droits d'envoi
        const userCredential = await signInWithEmailAndPassword(auth, email, pass);
        
        // 2. Envoi du mail (on attend bien la fin de la promesse)
        await sendEmailVerification(userCredential.user);

        // 3. MISE À JOUR UI (On le fait AVANT de déconnecter)
        errorContainer.classList.replace('bg-amber-50', 'bg-green-50');
        errorContainer.classList.replace('text-amber-700', 'text-green-600');
        errorContainer.classList.replace('border-amber-100', 'border-green-100');
        
        errorMessage.textContent = "Nouveau lien envoyé avec succès !";
        resendBtn.classList.add('hidden');
        
        const icon = document.getElementById('error-icon');
        icon.setAttribute('data-lucide', 'check-circle');
        lucide.createIcons();

        // 4. On attend 1 seconde pour être sûr que tout est validé côté Firebase
        setTimeout(async () => {
            await signOut(auth);
            console.log("Déconnexion de sécurité effectuée.");
        }, 1000);

    } catch (err) {
        console.error("Détail erreur:", err.code);
        // Si l'erreur est juste 'auth/network-request-failed' mais que le mail arrive, 
        // c'est souvent un micro-conflit de déconnexion.
        resendBtn.textContent = "Erreur. Réessaye dans 1 minute.";
        resendBtn.style.pointerEvents = "auto";
    }
};
                    await signOut(auth);
                } else {
                    window.location.href = 'index.html';
                }

            } catch (error) {
                console.error(error.code);
                let msg = "Identifiants invalides.";
                
                if (error.code === 'auth/invalid-credential') msg = "Email ou mot de passe incorrect.";
                if (error.code === 'auth/user-not-found') msg = "Aucun compte trouvé.";
                if (error.code === 'auth/too-many-requests') msg = "Compte bloqué temporairement. Réessaie plus tard.";
                
                displayError(msg);
            }
        };
    </script>
</body>
</html>
