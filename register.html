<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Rejoindre UnivMarket | Le Marché des Étudiants</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; overflow-x: hidden; }
        .auth-card { animation: slideUp 0.6s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .input-focus { @apply focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 transition-all duration-300; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 sm:p-6 text-slate-900">

    <main id="register-container" class="auth-card w-full max-w-lg bg-white rounded-[3rem] shadow-2xl shadow-indigo-200/40 p-8 sm:p-12 border border-slate-100 relative">
        
        <header class="text-center mb-10">
            <div class="inline-flex p-4 bg-indigo-600 rounded-[1.5rem] text-white mb-6 shadow-2xl shadow-indigo-200 animate-bounce-short">
                <i data-lucide="user-plus" class="w-8 h-8"></i>
            </div>
            <h1 class="text-3xl font-black text-slate-800 tracking-tight leading-none">Créer un compte</h1>
            <p class="text-slate-400 font-medium mt-3">Rejoins la communauté UnivMarket au Bénin</p>
        </header>

        <div id="error-box" class="hidden mb-6 p-4 bg-red-50 border border-red-100 text-red-600 rounded-2xl text-sm font-bold flex items-center gap-3">
            <i data-lucide="alert-circle" class="w-5 h-5"></i>
            <span id="error-msg"></span>
        </div>

        <form id="register-form" class="space-y-5">
            <div class="space-y-2">
                <label class="text-[11px] font-black text-slate-400 uppercase tracking-[0.1em] ml-1">Nom Complet</label>
                <div class="relative">
                    <input type="text" id="reg-name" placeholder="Ex: Jean DOSSOU" required
                           class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-[1.2rem] outline-none input-focus font-semibold text-slate-700">
                    <i data-lucide="user" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-300"></i>
                </div>
            </div>

            <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
                <div class="space-y-2">
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-[0.1em] ml-1">Email Étudiant</label>
                    <div class="relative">
                        <input type="email" id="reg-email" placeholder="nom@exemple.com" required
                               class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-[1.2rem] outline-none input-focus font-semibold text-slate-700">
                        <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-300"></i>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[11px] font-black text-slate-400 uppercase tracking-[0.1em] ml-1">WhatsApp (+229)</label>
                    <div class="relative">
                        <input type="tel" id="reg-phone" placeholder="0190000000" maxlength="10" required
                               class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-[1.2rem] outline-none input-focus font-black text-slate-700">
                        <i data-lucide="message-circle" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-300"></i>
                    </div>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[11px] font-black text-slate-400 uppercase tracking-[0.1em] ml-1">Université / École</label>
                <div class="relative">
                    <select id="reg-university" required
                            class="w-full pl-12 pr-10 py-4 bg-slate-50 border border-slate-100 rounded-[1.2rem] outline-none input-focus appearance-none font-semibold text-slate-700">
                        <option value="">Sélectionner ton campus</option>
                        <optgroup label="Universités Nationales">
                            <option value="UAC">UAC (Abomey-Calavi)</option>
                            <option value="UP">UP (Porto-Novo)</option>
                            <option value="UNSTIM">UNSTIM (Abomey)</option>
                            <option value="UPARAKOU">Université de Parakou</option>
                        </optgroup>
                        <optgroup label="Grandes Écoles & Instituts">
                            <option value="ENEAM">ENEAM</option>
                            <option value="EPAC">EPAC</option>
                            <option value="ENAM">ENAM</option>
                            <option value="IFRI">IFRI</option>
                            <option value="EGM">École de Génie Militaire</option>
                            <option value="IUT">IUT (Lokossa)</option>
                        </optgroup>
                        <optgroup label="Écoles Privées">
                            <option value="ESM">ESM-Benin</option>
                            <option value="Pigier">Pigier Bénin</option>
                            <option value="UATM">UATM (Gasa Formation)</option>
                            <option value="ISM">ISM Adonai</option>
                            <option value="IUA">IUA</option>
                        </optgroup>
                    </select>
                    <i data-lucide="graduation-cap" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-300"></i>
                    <i data-lucide="chevron-down" class="absolute right-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400 pointer-events-none"></i>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[11px] font-black text-slate-400 uppercase tracking-[0.1em] ml-1">Mot de passe</label>
                <div class="relative">
                    <input type="password" id="reg-pass" placeholder="6 caractères minimum" minlength="6" required
                           class="w-full pl-12 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-[1.2rem] outline-none input-focus font-semibold text-slate-700">
                    <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-300"></i>
                </div>
            </div>

            <button type="submit" id="btn-text" class="w-full bg-slate-900 text-white py-5 rounded-[1.5rem] font-black text-lg hover:bg-indigo-600 transition-all shadow-xl shadow-slate-200 active:scale-[0.97] mt-4 flex items-center justify-center gap-3">
                Finaliser l'inscription
                <i data-lucide="arrow-right" class="w-5 h-5"></i>
            </button>
        </form>

        <footer class="text-center mt-10 pt-6 border-t border-slate-50">
            <p class="text-slate-400 text-sm font-medium">
                Tu as déjà un compte ? <a href="login.html" class="text-indigo-600 font-extrabold hover:underline ml-1">Se connecter</a>
            </p>
        </footer>
    </main>

    <div id="loader" class="fixed inset-0 bg-slate-900/40 backdrop-blur-md hidden flex-col items-center justify-center z-50 transition-all">
        <div class="bg-white p-8 rounded-[3rem] flex flex-col items-center shadow-2xl">
            <div class="w-16 h-16 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
            <p class="mt-6 font-black text-slate-800 uppercase tracking-tighter">Création du profil...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
            authDomain: "unimarket-d6259.firebaseapp.com",
            projectId: "unimarket-d6259",
            storageBucket: "unimarket-d6259.firebasestorage.app",
            messagingSenderId: "236655322274",
            appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        lucide.createIcons();

        const form = document.getElementById('register-form');
        const loader = document.getElementById('loader');
        const errorBox = document.getElementById('error-box');
        const errorMsg = document.getElementById('error-msg');

        function showError(text) {
            errorMsg.textContent = text;
            errorBox.classList.remove('hidden');
            loader.classList.add('hidden');
            loader.classList.remove('flex');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            errorBox.classList.add('hidden');
            loader.classList.remove('hidden');
            loader.classList.add('flex');

            const name = document.getElementById('reg-name').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const univ = document.getElementById('reg-university').value;
            const pass = document.getElementById('reg-pass').value;

            // Ingénierie du numéro Bénin
            if(phone.length !== 10) return showError("Le numéro WhatsApp doit contenir 10 chiffres.");
            const fullPhone = "229" + phone;

            try {
                // 1. Auth Firebase
                const userCredential = await createUserWithEmailAndPassword(auth, email, pass);
                const user = userCredential.user;

                // 2. Profil Public
                await updateProfile(user, { displayName: name });

                // 3. Mail de vérification
                await sendEmailVerification(user);

                // 4. Base de données Étudiant (Crucial pour tes futures annonces)
                await setDoc(doc(db, "users", user.uid), {
                    uid: user.uid,
                    displayName: name,
                    email: email,
                    phone: fullPhone, // Enregistré proprement
                    university: univ,
                    createdAt: serverTimestamp(),
                    isVerified: false,
                    userType: "student"
                });

                // Écran de succès ingénieux
                document.getElementById('register-container').innerHTML = `
    <div class="text-center py-10 animate-slideUp">
        <div class="w-24 h-24 bg-green-50 text-green-500 rounded-[2.2rem] flex items-center justify-center mx-auto mb-8 shadow-xl shadow-green-100 border border-green-100">
            <i data-lucide="mail-check" class="w-12 h-12"></i>
        </div>
        <h2 class="text-3xl font-black text-slate-800 mb-4 tracking-tighter">Vérifie tes mails !</h2>
        <div class="space-y-4 px-4">
            <p class="text-slate-500 font-medium leading-relaxed">
                Un lien de confirmation vient d'être envoyé à <br>
                <span class="text-indigo-600 font-black">${email}</span>
            </p>
            <div class="bg-amber-50 text-amber-700 p-4 rounded-2xl text-xs font-bold border border-amber-100 flex items-center gap-3">
                <i data-lucide="info" class="w-5 h-5 flex-shrink-0"></i>
                <span class="text-left">IMPORTANT : Vérifie tes <b>SPAMS</b> si tu ne vois rien d'ici 1 minute.</span>
            </div>
        </div>
        <button onclick="window.location.href='login.html'" class="w-full mt-10 bg-slate-900 text-white py-5 rounded-[1.5rem] font-black text-lg shadow-2xl active:scale-95 transition-all">
            Aller à la connexion
        </button>
    </div>
`;
                lucide.createIcons();
                loader.classList.add('hidden');

            } catch (error) {
                console.error(error);
                let message = "Une erreur technique est survenue.";
                if (error.code === 'auth/email-already-in-use') message = "Cet email possède déjà un compte UnivMarket.";
                if (error.code === 'auth/invalid-email') message = "L'adresse email n'est pas valide.";
                if (error.code === 'auth/weak-password') message = "Le mot de passe est trop simple.";
                
                showError(message);
            }
        };
    </script>
</body>
</html>
