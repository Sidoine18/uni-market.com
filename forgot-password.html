<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>Récupération | UnivMarket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        input { font-size: 16px !important; }
        .auth-card { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

    <main id="auth-container" class="auth-card w-full max-w-md bg-white rounded-[2.5rem] shadow-2xl p-6 sm:p-10 border border-slate-100 relative text-slate-900">
        
        <header class="text-center mb-8">
            <div class="inline-flex p-3.5 bg-amber-500 rounded-2xl text-white mb-4 shadow-xl shadow-amber-100">
                <i data-lucide="key-round" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-extrabold text-slate-800 tracking-tight">Accès perdu ?</h1>
            <p class="text-slate-500 text-sm mt-2">Saisis ton email pour recevoir un lien de réinitialisation sécurisé.</p>
        </header>

        <form id="reset-form" class="space-y-6">
            <div class="space-y-1">
                <label class="block text-[10px] font-bold text-slate-400 uppercase ml-1 tracking-widest">Email de ton compte</label>
                <div class="relative group">
                    <input type="email" id="reset-email" placeholder="etudiant@uac.bj" required
                           class="w-full pl-11 pr-4 py-4 bg-slate-50 border border-slate-100 rounded-2xl focus:ring-2 focus:ring-amber-500 outline-none text-sm">
                    <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400"></i>
                </div>
            </div>

            <button type="submit" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold hover:bg-black transition-all shadow-xl active:scale-[0.98]">
                Envoyer le lien
            </button>
        </form>

        <footer class="text-center text-slate-500 text-xs sm:text-sm mt-8">
            <a href="login.html" class="text-indigo-600 font-bold hover:underline">Retour à la connexion</a>
        </footer>
    </main>

    <div id="loader" class="fixed inset-0 bg-white/90 backdrop-blur-sm hidden flex-col items-center justify-center z-50">
        <div class="w-14 h-14 border-4 border-amber-500 border-t-transparent rounded-full animate-spin mb-4"></div>
        <p class="font-bold text-amber-600">Envoi du lien en cours...</p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Configuration UnivMarket (Tes clés réelles)
        const firebaseConfig = {
            apiKey: "AIzaSyBJfyELCr3EBjHydo2JSL2akShecqcx0yA",
            authDomain: "unimarket-d6259.firebaseapp.com",
            projectId: "unimarket-d6259",
            storageBucket: "unimarket-d6259.firebasestorage.app",
            messagingSenderId: "236655322274",
            appId: "1:236655322274:web:c91d9c59dba3d8d22d63fb"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        lucide.createIcons();

        const form = document.getElementById('reset-form');
        const loader = document.getElementById('loader');
        const container = document.getElementById('auth-container');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            loader.classList.remove('hidden');
            loader.classList.add('flex');

            const email = document.getElementById('reset-email').value;

            try {
                await sendPasswordResetEmail(auth, email);
                
                // Succès : Changement d'interface
                loader.classList.add('hidden');
                container.innerHTML = `
                    <div class="text-center py-4 animate-slide-up">
                        <div class="w-20 h-20 bg-emerald-100 text-emerald-600 rounded-full flex items-center justify-center mx-auto mb-6 shadow-inner">
                            <i data-lucide="check-circle" class="w-10 h-10"></i>
                        </div>
                        <h2 class="text-2xl font-extrabold text-slate-800">Email envoyé !</h2>
                        <p class="text-slate-500 mt-4 text-sm leading-relaxed">
                            Vérifie ta boîte mail <b>${email}</b>. Un lien t'attend pour réinitialiser ton mot de passe.
                        </p>
                        <button onclick="window.location.href='login.html'" class="w-full mt-8 bg-indigo-600 text-white py-4 rounded-2xl font-bold">
                            Retourner au login
                        </button>
                    </div>
                `;
                lucide.createIcons();
            } catch (error) {
                loader.classList.add('hidden');
                let msg = "Erreur lors de l'envoi.";
                if (error.code === 'auth/user-not-found') msg = "Aucun compte avec cet email.";
                alert(msg + " (" + error.code + ")");
            }
        });
    </script>
</body>
</html>
